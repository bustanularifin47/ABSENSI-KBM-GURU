            useEffect(() => {

                return () => clearTimeout(timer);
            }, [onClose]);
            const bgColor = type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500';
            return (
                <div className={`fixed top-4 right-4 z-50 ${bgColor} text-white px-6 py-3 rounded-lg shadow-lg animate-fadeIn flex items-center gap-2`}>
                    {type === 'success' && <Icons.CheckCircle />}

            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                setTimeout(() => {
                    const users = DB.getUsers();
                    const user = users.find(u => u.username === username && u.password === password);
                    if (user) {
                        DB.setCurrentUser(user);
                        onLogin(user);
                    } else {
                        setError('Username atau password salah!');
                    }
                    setLoading(false);
                }, 500);
            };

            return (

        // Main App Component
        function App() {
            const [user, setUser] = useState(null);
            const [showLanding, setShowLanding] = useState(true);

            useEffect(() => {
                DB.initialize();
                const currentUser = DB.getCurrentUser();
                if (currentUser) {
                    setUser(currentUser);
                    setShowLanding(false);
                }
            }, []);

            const handleLogin = (userData) => {
                setUser(userData);
            };

            const handleLogout = () => {
                DB.logout();
                setUser(null);
                setShowLanding(true);
            };

            // Show landing page first
            if (showLanding) {
                return React.createElement(LandingPage, { onStart: () => setShowLanding(false) });
            }

            // Show login if no user
            if (!user) {
                return React.createElement(Login, { onLogin: handleLogin });
            }

            // Show dashboard based on role
            if (user.role === 'admin') {
                return React.createElement(AdminDashboard, { onLogout: handleLogout });
            }

            return React.createElement(GuruDashboard, { user: user, onLogout: handleLogout });
        }

            useEffect(() => {
                setAbsensi(DB.getAbsensi());

                setGuru(DB.getGuru());
                setKelas(DB.getKelas());
                setMapel(DB.getMapel());
                setJamPelajaran(DB.getJamPelajaran());
            }, []);

            const getNamaGuru = (id) => guru.find(g => g.id === id)?.nama || '-';
            const getNamaKelas = (id) => kelas.find(k => k.id === id)?.nama || '-';
            const getNamaMapel = (id) => mapel.find(m => m.id === id)?.nama || '-';
            const getJam = (id) => jamPelajaran.find(j => j.id === id);

            const getHariIndonesia = (dateStr) => {
                const hari = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
                const date = new Date(dateStr);
                return hari[date.getDay()];
            };

            const getGuruBelumAbsen = () => {
                const hariIni = getHariIndonesia(filterTanggal);
                const jadwalHariIni = jadwal.filter(j => j.hari === hariIni);
                const absensiHariIni = absensi.filter(a => a.tanggal === filterTanggal);
                const guruSudahAbsen = absensiHariIni.map(a => a.guruId);
                
                return jadwalHariIni.filter(j => !guruSudahAbsen.includes(j.guruId)).map(j => ({
                    ...j,
                    namaGuru: getNamaGuru(j.guruId),
                    namaKelas: getNamaKelas(j.kelasId),
                    namaMapel: getNamaMapel(j.mapelId),
                    jam: getJam(j.jamId)
                }));
            };

            const guruBelumAbsen = getGuruBelumAbsen();

                const matchTanggal = a.tanggal === filterTanggal;
                const matchGuru = !filterGuru || a.guruId === parseInt(filterGuru);
                const matchKelas = !filterKelas || a.kelasId === parseInt(filterKelas);
                return matchTanggal && matchGuru && matchKelas;

        // Profil Admin Content
        function ProfilAdminContent() {
            const [admin, setAdmin] = useState(null);
            const [isPasswordModalOpen, setIsPasswordModalOpen] = useState(false);
            const [passwordData, setPasswordData] = useState({ currentPassword: '', newPassword: '', confirmPassword: '' });
            const [toast, setToast] = useState(null);

            useEffect(() => {
                const currentUser = DB.getCurrentUser();
                const users = DB.getUsers();
                const adminUser = users.find(u => u.id === currentUser.id);
                setAdmin(adminUser);
            }, []);

            const handleChangePassword = (e) => {
                e.preventDefault();
                if (passwordData.newPassword !== passwordData.confirmPassword) {
                    setToast({ message: 'Password baru dan konfirmasi tidak cocok!', type: 'error' });
                    return;
                }
                if (passwordData.newPassword.length < 6) {
                    setToast({ message: 'Password baru minimal 6 karakter!', type: 'error' });
                    return;
                }
                
                const users = DB.getUsers();
                const adminIndex = users.findIndex(u => u.id === admin.id);
                
                if (users[adminIndex].password !== passwordData.currentPassword) {
                    setToast({ message: 'Password saat ini salah!', type: 'error' });
                    return;
                }

                users[adminIndex].password = passwordData.newPassword;
                DB.setUsers(users);
                setToast({ message: 'Password berhasil diubah!', type: 'success' });
                setIsPasswordModalOpen(false);
                setPasswordData({ currentPassword: '', newPassword: '', confirmPassword: '' });
            };

            if (!admin) return React.createElement('div', null, 'Loading...');

            return (
                <div className="space-y-6">
                    <h2 className="text-3xl font-bold text-gray-800">Profil Admin</h2>
                    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
                        <div className="flex items-center gap-6 mb-8">
                            <div className="w-24 h-24 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center text-white text-4xl font-bold">A</div>
                            <div>
                                <h3 className="text-2xl font-bold text-gray-800">{admin.nama}</h3>
                                <p className="text-gray-500">Administrator</p>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="p-4 bg-gray-50 rounded-xl">
                                <p className="text-sm text-gray-500 mb-1">Username</p>
                                <p className="font-semibold text-gray-800">{admin.username}</p>
                            </div>
                            <div className="p-4 bg-gray-50 rounded-xl">
                                <p className="text-sm text-gray-500 mb-1">Role</p>
                                <p className="font-semibold text-gray-800 capitalize">{admin.role}</p>
                            </div>
                        </div>
                        <div className="mt-8">
                            <button onClick={() => setIsPasswordModalOpen(true)} className="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-6 py-3 rounded-xl font-semibold hover:from-blue-700 hover:to-indigo-700 transition-all flex items-center gap-2">
                                <Icons.Lock /> Ganti Password
                            </button>
                        </div>
                    </div>

                    <Modal isOpen={isPasswordModalOpen} onClose={() => setIsPasswordModalOpen(false)} title="Ganti Password" maxWidth="max-w-md">
                        <form onSubmit={handleChangePassword} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Password Saat Ini</label>
                                <input type="password" value={passwordData.currentPassword} onChange={e => setPasswordData({...passwordData, currentPassword: e.target.value})} className="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Password Baru</label>
                                <input type="password" value={passwordData.newPassword} onChange={e => setPasswordData({...passwordData, newPassword: e.target.value})} className="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Konfirmasi Password Baru</label>
                                <input type="password" value={passwordData.confirmPassword} onChange={e => setPasswordData({...passwordData, confirmPassword: e.target.value})} className="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required />
                            </div>
                            <div className="flex gap-3 pt-4">
                                <button type="button" onClick={() => setIsPasswordModalOpen(false)} className="flex-1 px-4 py-2 border border-gray-200 rounded-lg hover:bg-gray-50">Batal</button>
                                <button type="submit" className="flex-1 px-4 py-2 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-lg">Simpan</button>
                            </div>
                        </form>
                    </Modal>

                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                </div>
            );
        }

        function GuruDashboardContent({ user, guruData }) {
            const [stats, setStats] = useState({ totalAbsensi: 0, absensiBulanIni: 0, totalJurnal: 0 });

            useEffect(() => {
                const absensi = DB.getAbsensi().filter(a => a.guruId === user.guruId);
                const jurnal = DB.getJurnal().filter(j => j.guruId === user.guruId);
                const jadwal = DB.getJadwal();
                const jamPelajaran = DB.getJamPelajaran();
                const kelas = DB.getKelas();
                const mapel = DB.getMapel();

                const bulanIni = new Date().toISOString().slice(0, 7);
                const absensiBulanIni = absensi.filter(a => a.tanggal.startsWith(bulanIni));

                const hariList = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
                const hariIni = hariList[new Date().getDay()];
                const jadwalGuruHariIni = jadwal.filter(j => j.guruId === user.guruId && j.hari === hariIni).map(j => ({
                    ...j,
                    kelas: kelas.find(k => k.id === j.kelasId)?.nama,
                    mapel: mapel.find(m => m.id === j.mapelId)?.nama,
                    jam: jamPelajaran.find(x => x.id === j.jamId)
                }));

                setStats({ totalAbsensi: absensi.length, absensiBulanIni: absensiBulanIni.length, totalJurnal: jurnal.length });
                setJadwalHariIni(jadwalGuruHariIni);
            }, [user.guruId]);

            return (

        // Guru Absensi - with time restrictions
        function GuruAbsensi({ user, guruData }) {
            const [jadwal, setJadwal] = useState([]);
            const [jamPelajaran, setJamPelajaran] = useState([]);
            const [kelas, setKelas] = useState([]);
            const [mapel, setMapel] = useState([]);
            const [selectedJadwal, setSelectedJadwal] = useState('');
            const [foto, setFoto] = useState(null);
            const [lokasi, setLokasi] = useState(null);
            const [lokasiNama, setLokasiNama] = useState('');
            const [loading, setLoading] = useState(false);
            const [toast, setToast] = useState(null);
            const [stream, setStream] = useState(null);
            const [showCamera, setShowCamera] = useState(false);
            const videoRef = useRef(null);
            const canvasRef = useRef(null);

            const hariList = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const hariIni = hariList[new Date().getDay()];

            useEffect(() => {
                setJadwal(DB.getJadwal().filter(j => j.guruId === user.guruId && j.hari === hariIni));
                setJamPelajaran(DB.getJamPelajaran());
                setKelas(DB.getKelas());
                setMapel(DB.getMapel());
                getLokasi();
            }, [user.guruId]);

            const isWithinSchedule = (jamId) => {
                const jam = jamPelajaran.find(j => j.id === jamId);
                if (!jam) return false;
                const now = new Date();
                const currentTime = now.getHours() * 60 + now.getMinutes();
                const [mulaiHour, mulaiMin] = jam.jamMulai.split(':').map(Number);
                const [selesaiHour, selesaiMin] = jam.jamSelesai.split(':').map(Number);
                const startTime = mulaiHour * 60 + mulaiMin;
                const endTime = selesaiHour * 60 + selesaiMin;
                return currentTime >= (startTime - 15) && currentTime <= endTime;
            };

            const getLokasi = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        async (position) => {
                            const { latitude, longitude } = position.coords;
                            setLokasi({ lat: latitude, lng: longitude });
                            try {
                                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                                const data = await response.json();
                                setLokasiNama(data.display_name || 'Lokasi tidak dikenali');
                            } catch (e) {
                                setLokasiNama('Gagal mendapatkan nama lokasi');
                            }
                        },
                        () => setToast({ message: 'Gagal mendapatkan lokasi', type: 'error' })
                    );
                }
            };

            const startCamera = async () => {
                try {
                    const mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                    setStream(mediaStream);
                    setShowCamera(true);
                    if (videoRef.current) videoRef.current.srcObject = mediaStream;
                } catch (e) {
                    setToast({ message: 'Gagal mengakses kamera', type: 'error' });
                }
            };

            const stopCamera = () => {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                    setStream(null);
                }
                setShowCamera(false);
            };

            const capturePhoto = () => {
                if (videoRef.current && canvasRef.current) {
                    const canvas = canvasRef.current;
                    const video = videoRef.current;
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    const photoData = canvas.toDataURL('image/jpeg');
                    setFoto(photoData);
                    stopCamera();
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!selectedJadwal) {
                    setToast({ message: 'Pilih jadwal mengajar', type: 'error' });
                    return;
                }
                if (!foto) {
                    setToast({ message: 'Ambil foto selfie terlebih dahulu', type: 'error' });
                    return;
                }
                if (!lokasi) {
                    setToast({ message: 'Tunggu lokasi terdeteksi', type: 'error' });
                    return;
                }

                const jadwalItem = jadwal.find(j => j.id === parseInt(selectedJadwal));
                if (!jadwalItem) {
                    setToast({ message: 'Jadwal tidak valid', type: 'error' });
                    return;
                }

                if (!isWithinSchedule(jadwalItem.jamId)) {
                    const jam = jamPelajaran.find(j => j.id === jadwalItem.jamId);
                    setToast({ message: `Absensi hanya bisa dilakukan pada jam mengajar: ${jam?.jamMulai} - ${jam?.jamSelesai}`, type: 'error' });
                    return;
                }

                const today = new Date().toISOString().split('T')[0];
                const existingAbsensi = DB.getAbsensi().find(a => a.guruId === user.guruId && a.tanggal === today && a.jadwalId === parseInt(selectedJadwal));
                if (existingAbsensi) {
                    setToast({ message: 'Anda sudah melakukan absensi untuk jadwal ini hari ini', type: 'error' });
                    return;
                }

                setLoading(true);
                setTimeout(() => {
                    const absensi = DB.getAbsensi();
                    absensi.push({
                        id: Date.now(),
                        guruId: user.guruId,
                        kelasId: jadwalItem.kelasId,
                        mapelId: jadwalItem.mapelId,
                        jamId: jadwalItem.jamId,
                        jadwalId: jadwalItem.id,
                        tanggal: today,
                        waktu: new Date().toLocaleTimeString('id-ID'),
                        foto: foto,
                        lokasi: { ...lokasi, namaJalan: lokasiNama }
                    });
                    DB.setAbsensi(absensi);
                    setToast({ message: 'Absensi berhasil disimpan!', type: 'success' });
                    setSelectedJadwal('');
                    setFoto(null);
                    setLoading(false);
                }, 1000);
            };

            const getNamaKelas = (id) => kelas.find(k => k.id === id)?.nama || '-';
            const getNamaMapel = (id) => mapel.find(m => m.id === id)?.nama || '-';
            const getJam = (id) => jamPelajaran.find(j => j.id === id);

            const now = new Date();
            const currentTimeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

            return (
                <div className="space-y-6">
                    <h2 className="text-3xl font-bold text-gray-800">Absensi KBM</h2>
                    
                    <div className="bg-blue-50 border border-blue-200 rounded-xl p-4">
                        <div className="flex items-center gap-2 text-blue-700 mb-2">
                            <Icons.Clock />
                            <span className="font-semibold">Informasi Waktu</span>
                        </div>
                        <p className="text-blue-600">Hari: <strong>{hariIni}</strong></p>
                        <p className="text-blue-600">Waktu Sekarang: <strong>{currentTimeStr}</strong></p>
                        <p className="text-blue-600 text-sm mt-2">Absensi hanya dapat dilakukan pada jam mengajar (15 menit sebelum jam mulai sampai jam selesai)</p>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">Pilih Jadwal Mengajar</label>
                                {jadwal.length === 0 ? (
                                    <div className="p-4 bg-gray-50 rounded-xl text-gray-500 text-center">Tidak ada jadwal mengajar hari ini</div>
                                ) : (
                                    <div className="space-y-3">
                                        {jadwal.map(j => {
                                            const jam = getJam(j.jamId);
                                            const canAbsen = isWithinSchedule(j.jamId);
                                            return (
                                                <label key={j.id} className={`flex items-center p-4 border-2 rounded-xl cursor-pointer transition-all ${selectedJadwal === j.id.toString() ? 'border-emerald-500 bg-emerald-50' : 'border-gray-200 hover:border-gray-300'} ${!canAbsen ? 'opacity-60' : ''}`}>
                                                    <input type="radio" name="jadwal" value={j.id} checked={selectedJadwal === j.id.toString()} onChange={e => setSelectedJadwal(e.target.value)} className="w-5 h-5 text-emerald-600" disabled={!canAbsen} />
                                                    <div className="ml-4 flex-1">
                                                        <p className="font-semibold text-gray-800">{getNamaKelas(j.kelasId)} - {getNamaMapel(j.mapelId)}</p>
                                                        <p className="text-sm text-gray-500">{jam ? `${jam.nama} (${jam.jamMulai} - ${jam.jamSelesai})` : '-'}</p>
                                                        {!canAbsen && <p className="text-xs text-red-500 mt-1">Diluar jam mengajar</p>}
                                                    </div>
                                                    {canAbsen && <span className="px-3 py-1 bg-green-100 text-green-700 text-xs rounded-full">Bisa Absen</span>}
                                                </label>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>

                            {lokasi && (
                                <div className="p-4 bg-gray-50 rounded-xl">
                                    <div className="flex items-center gap-2 text-gray-700 mb-2"><Icons.MapPin /><span className="font-semibold">Lokasi</span></div>
                                    <p className="text-sm text-gray-600">{lokasiNama || 'Mendeteksi nama lokasi...'}</p>
                                    <p className="text-xs text-gray-400 mt-1">Koordinat: {lokasi.lat?.toFixed(6)}, {lokasi.lng?.toFixed(6)}</p>
                                </div>
                            )}

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">Foto Selfie</label>
                                {!foto ? (
                                    <div>
                                        {!showCamera ? (
                                            <button type="button" onClick={startCamera} className="w-full py-12 border-2 border-dashed border-gray-300 rounded-xl hover:border-emerald-500 hover:bg-emerald-50 transition-all flex flex-col items-center gap-3">
                                                <div className="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center text-3xl">📷</div>
                                                <span className="text-gray-600">Klik untuk mengambil foto selfie</span>
                                            </button>
                                        ) : (
                                            <div className="video-container">
                                                <video ref={videoRef} autoPlay playsInline className="video-preview" />
                                                <canvas ref={canvasRef} className="hidden" />
                                                <div className="flex gap-3 mt-4 justify-center">
                                                    <button type="button" onClick={stopCamera} className="px-4 py-2 border border-gray-200 rounded-lg hover:bg-gray-50">Batal</button>
                                                    <button type="button" onClick={capturePhoto} className="px-6 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700">Ambil Foto</button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="relative">
                                        <img src={foto} alt="Selfie" className="captured-photo" />
                                        <button type="button" onClick={() => { setFoto(null); startCamera(); }} className="absolute top-2 right-2 p-2 bg-white/80 rounded-lg hover:bg-white"><Icons.Edit /></button>
                                    </div>
                                )}
                            </div>

                            <button type="submit" disabled={loading || jadwal.length === 0} className="w-full bg-gradient-to-r from-emerald-600 to-teal-600 text-white py-4 rounded-xl font-semibold hover:from-emerald-700 hover:to-teal-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                                {loading ? 'Menyimpan...' : 'Simpan Absensi'}
                            </button>
                        </form>
                    </div>
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                </div>
            );
        }


        // Guru Jurnal
        function GuruJurnal({ user, guruData }) {
            const [jurnal, setJurnal] = useState([]);
            const [kelas, setKelas] = useState([]);
            const [mapel, setMapel] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingJurnal, setEditingJurnal] = useState(null);
            const [formData, setFormData] = useState({ kelasId: '', mapelId: '', tanggal: new Date().toISOString().split('T')[0], materi: '', keterangan: '' });

            useEffect(() => {
                setJurnal(DB.getJurnal().filter(j => j.guruId === user.guruId));
                setKelas(DB.getKelas());
                setMapel(DB.getMapel());
            }, [user.guruId]);

            const handleSubmit = (e) => {
                e.preventDefault();
                const data = DB.getJurnal();
                if (editingJurnal) {
                    const idx = data.findIndex(j => j.id === editingJurnal.id);
                    data[idx] = { ...editingJurnal, ...formData, kelasId: parseInt(formData.kelasId), mapelId: parseInt(formData.mapelId) };
                } else {
                    data.push({ ...formData, kelasId: parseInt(formData.kelasId), mapelId: parseInt(formData.mapelId), guruId: user.guruId, id: Date.now() });
                }
                DB.setJurnal(data);
                setJurnal(data.filter(j => j.guruId === user.guruId));
                setIsModalOpen(false);
                setEditingJurnal(null);
                setFormData({ kelasId: '', mapelId: '', tanggal: new Date().toISOString().split('T')[0], materi: '', keterangan: '' });
            };

            const handleEdit = (j) => { setEditingJurnal(j); setFormData({ ...j, kelasId: j.kelasId.toString(), mapelId: j.mapelId.toString() }); setIsModalOpen(true); };

            const handleDelete = (id) => {
                if (confirm('Yakin ingin menghapus jurnal ini?')) {
                    const data = DB.getJurnal().filter(j => j.id !== id);
                    DB.setJurnal(data);
                    setJurnal(data.filter(j => j.guruId === user.guruId));
                }
            };

            const getNamaKelas = (id) => kelas.find(k => k.id === id)?.nama || '-';
            const getNamaMapel = (id) => mapel.find(m => m.id === id)?.nama || '-';

            return (
                <div className="space-y-6">
                    <div className="flex items-center justify-between">
                        <h2 className="text-3xl font-bold text-gray-800">Jurnal Kegiatan</h2>
                        <button onClick={() => { setEditingJurnal(null); setFormData({ kelasId: kelas[0]?.id || '', mapelId: mapel[0]?.id || '', tanggal: new Date().toISOString().split('T')[0], materi: '', keterangan: '' }); setIsModalOpen(true); }} className="bg-gradient-to-r from-emerald-600 to-teal-600 text-white px-6 py-3 rounded-xl font-semibold hover:from-emerald-700 hover:to-teal-700 transition-all flex items-center gap-2"><Icons.Plus /> Tambah Jurnal</button>
                    </div>
                    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full">
                                <thead className="bg-gray-50"><tr><th className="px-6 py-4 text-left text-sm font-semibold text-gray-600">Tanggal</th><th className="px-6 py-4 text-left text-sm font-semibold text-gray-600">Kelas</th><th className="px-6 py-4 text-left text-sm font-semibold text-gray-600">Mapel</th><th className="px-6 py-4 text-left text-sm font-semibold text-gray-600">Materi</th><th className="px-6 py-4 text-left text-sm font-semibold text-gray-600">Aksi</th></tr></thead>
                                <tbody className="divide-y divide-gray-100">
                                    {jurnal.length === 0 ? <tr><td colSpan="5" className="px-6 py-8 text-center text-gray-500">Belum ada data jurnal</td></tr> : jurnal.map(j => (
                                        <tr key={j.id} className="hover:bg-gray-50"><td className="px-6 py-4">{j.tanggal}</td><td className="px-6 py-4">{getNamaKelas(j.kelasId)}</td><td className="px-6 py-4">{getNamaMapel(j.mapelId)}</td><td className="px-6 py-4 max-w-xs truncate">{j.materi}</td><td className="px-6 py-4"><div className="flex gap-2"><button onClick={() => handleEdit(j)} className="p-2 text-blue-600 hover:bg-blue-50 rounded-lg"><Icons.Edit /></button><button onClick={() => handleDelete(j.id)} className="p-2 text-red-600 hover:bg-red-50 rounded-lg"><Icons.Trash /></button></div></td></tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <Modal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} title={editingJurnal ? 'Edit Jurnal' : 'Tambah Jurnal'}>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">Tanggal</label><input type="date" value={formData.tanggal} onChange={e => setFormData({...formData, tanggal: e.target.value})} className="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" required /></div>
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">Kelas</label><select value={formData.kelasId} onChange={e => setFormData({...formData, kelasId: e.target.value})} className="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" required><option value="">Pilih Kelas</option>{kelas.map(k => <option key={k.id} value={k.id}>{k.nama}</option>)}</select></div>

                        </form>
                    </Modal>

                                <tbody className="divide-y divide-gray-100">
                                    {absensi.length === 0 ? (
                                        <tr><td colSpan="7" className="px-6 py-8 text-center text-gray-500">Belum ada riwayat absensi</td></tr>
                                    ) : (
                                        absensi.map(a => (
                                            <tr key={a.id} className="hover:bg-gray-50">
                                                <td className="px-6 py-4">{a.tanggal}</td>
                                                <td className="px-6 py-4">{a.waktu}</td>
                                                <td className="px-6 py-4">{getNamaKelas(a.kelasId)}</td>
                                                <td className="px-6 py-4">{getNamaMapel(a.mapelId)}</td>
                                                <td className="px-6 py-4">{getJam(a.jamId)?.nama || '-'}</td>
                                                <td className="px-6 py-4">
                                                    {a.foto ? (
                                                        <button onClick={() => setViewImage({ src: a.foto, title: `Foto Absensi - ${a.tanggal}` })} className="relative group">
                                                            <img src={a.foto} alt="Foto Selfie" className="w-16 h-16 object-cover rounded-lg border border-gray-200" />
                                                            <div className="absolute inset-0 bg-black/50 rounded-lg flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                                                <Icons.Eye />
                                                            </div>
                                                        </button>
                                                    ) : (
                                                        <span className="text-gray-400 text-sm">-</span>
                                                    )}
                                                </td>
                                                <td className="px-6 py-4">
                                                    <div className="text-sm max-w-xs">
                                                        <p className="text-gray-600 truncate">{a.lokasi?.namaJalan || '-'}</p>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <ImageViewer isOpen={!!viewImage} onClose={() => setViewImage(null)} imageSrc={viewImage?.src} title={viewImage?.title} />
                </div>
            );
        }

        // Guru Profil
        function GuruProfil({ user, guruData }) {
            const [isPasswordModalOpen, setIsPasswordModalOpen] = useState(false);
            const [passwordData, setPasswordData] = useState({ currentPassword: '', newPassword: '', confirmPassword: '' });
            const [toast, setToast] = useState(null);

            const handleChangePassword = (e) => {
                e.preventDefault();
                if (passwordData.newPassword !== passwordData.confirmPassword) {
                    setToast({ message: 'Password baru dan konfirmasi tidak cocok!', type: 'error' });
                    return;
                }
                if (passwordData.newPassword.length < 6) {
                    setToast({ message: 'Password baru minimal 6 karakter!', type: 'error' });
                    return;
                }
                
                const users = DB.getUsers();
                const userIndex = users.findIndex(u => u.id === user.id);
                
                if (users[userIndex].password !== passwordData.currentPassword) {
                    setToast({ message: 'Password saat ini salah!', type: 'error' });
                    return;
                }

                users[userIndex].password = passwordData.newPassword;
                DB.setUsers(users);
                setToast({ message: 'Password berhasil diubah!', type: 'success' });
                setIsPasswordModalOpen(false);
                setPasswordData({ currentPassword: '', newPassword: '', confirmPassword: '' });
            };

            if (!guruData) return React.createElement('div', null, 'Loading...');

            return (
                <div className="space-y-6">
                    <h2 className="text-3xl font-bold text-gray-800">Profil Guru</h2>
                    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
                        <div className="flex items-center gap-6 mb-8">
                            <div className="w-24 h-24 bg-gradient-to-br from-emerald-500 to-teal-600 rounded-2xl flex items-center justify-center text-white text-4xl font-bold">{guruData.nama.charAt(0)}</div>
                            <div>
                                <h3 className="text-2xl font-bold text-gray-800">{guruData.nama}</h3>
                                <p className="text-gray-500">{guruData.nip}</p>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="p-4 bg-gray-50 rounded-xl">
                                <p className="text-sm text-gray-500 mb-1">NIP</p>
                                <p className="font-semibold text-gray-800">{guruData.nip}</p>
                            </div>
                            <div className="p-4 bg-gray-50 rounded-xl">
                                <p className="text-sm text-gray-500 mb-1">Jenis Kelamin</p>
                                <p className="font-semibold text-gray-800">{guruData.jenisKelamin}</p>
                            </div>
                            <div className="p-4 bg-gray-50 rounded-xl">
                                <p className="text-sm text-gray-500 mb-1">No. HP</p>
                                <p className="font-semibold text-gray-800">{guruData.noHp}</p>
                            </div>
                            <div className="p-4 bg-gray-50 rounded-xl">
                                <p className="text-sm text-gray-500 mb-1">Status</p>
                                <p className="font-semibold text-gray-800">{guruData.status}</p>
                            </div>
                            <div className="p-4 bg-gray-50 rounded-xl md:col-span-2">
                                <p className="text-sm text-gray-500 mb-1">Alamat</p>
                                <p className="font-semibold text-gray-800">{guruData.alamat}</p>
                            </div>
                        </div>
                        <div className="mt-8">
                            <button onClick={() => setIsPasswordModalOpen(true)} className="bg-gradient-to-r from-emerald-600 to-teal-600 text-white px-6 py-3 rounded-xl font-semibold hover:from-emerald-700 hover:to-teal-700 transition-all flex items-center gap-2">
                                <Icons.Lock /> Ganti Password
                            </button>
                        </div>
                    </div>

                    <Modal isOpen={isPasswordModalOpen} onClose={() => setIsPasswordModalOpen(false)} title="Ganti Password" maxWidth="max-w-md">
                        <form onSubmit={handleChangePassword} className="space-y-4">
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">Password Saat Ini</label><input type="password" value={passwordData.currentPassword} onChange={e => setPasswordData({...passwordData, currentPassword: e.target.value})} className="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" required /></div>
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">Password Baru</label><input type="password" value={passwordData.newPassword} onChange={e => setPasswordData({...passwordData, newPassword: e.target.value})} className="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" required /></div>
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">Konfirmasi Password Baru</label><input type="password" value={passwordData.confirmPassword} onChange={e => setPasswordData({...passwordData, confirmPassword: e.target.value})} className="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" required /></div>
                            <div className="flex gap-3 pt-4"><button type="button" onClick={() => setIsPasswordModalOpen(false)} className="flex-1 px-4 py-2 border border-gray-200 rounded-lg hover:bg-gray-50">Batal</button><button type="submit" className="flex-1 px-4 py-2 bg-gradient-to-r from-emerald-600 to-teal-600 text-white rounded-lg">Simpan</button></div>
                        </form>
                    </Modal>

                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                </div>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
