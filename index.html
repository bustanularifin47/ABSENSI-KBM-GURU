                const users = this.getUsers();

                else users.push(user);
                this.setItem('ejurnal_users', users);

                        user.nama = formData.nama;
                        user.email = formData.email;

                        email: formData.email,
                        createdAt: new Date().toISOString()

        function SiswaContent({ onRefresh }) {
            const [siswa, setSiswa] = useState(DB.getSiswa());
            const [kelas] = useState(DB.getKelas());
            const [search, setSearch] = useState('');
            const [filterKelas, setFilterKelas] = useState('');
            const [editing, setEditing] = useState(null);
            const [showForm, setShowForm] = useState(false);
            const [showImport, setShowImport] = useState(false);
            const [importData, setImportData] = useState('');
            const [formData, setFormData] = useState({
                nis: '', nama: '', kelasId: '', jenisKelamin: 'L', tempatLahir: '', tanggalLahir: '', alamat: '', namaOrtu: '', noTelepon: ''
            });

            const filtered = siswa.filter(s => {
                const matchSearch = s.nama.toLowerCase().includes(search.toLowerCase()) || s.nis.includes(search);
                const matchKelas = filterKelas ? s.kelasId === filterKelas : true;
                return matchSearch && matchKelas;
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                if (editing) {
                    DB.saveSiswa({ ...editing, ...formData });
                } else {
                    DB.saveSiswa({
                        id: 'siswa-' + Date.now(),
                        ...formData,
                        createdAt: new Date().toISOString()
                    });
                }
                updateKelasCount();
                setSiswa(DB.getSiswa());
                setShowForm(false);
                setEditing(null);
                setFormData({ nis: '', nama: '', kelasId: '', jenisKelamin: 'L', tempatLahir: '', tanggalLahir: '', alamat: '', namaOrtu: '', noTelepon: '' });
                onRefresh();
            };

            const updateKelasCount = () => {
                kelas.forEach(k => {
                    const count = DB.getSiswaByKelas(k.id).length;
                    DB.saveKelas({ ...k, jumlahSiswa: count });
                });
            };

            const handleEdit = (s) => {
                setEditing(s);
                setFormData({
                    nis: s.nis, nama: s.nama, kelasId: s.kelasId, jenisKelamin: s.jenisKelamin || 'L',
                    tempatLahir: s.tempatLahir || '', tanggalLahir: s.tanggalLahir || '',
                    alamat: s.alamat || '', namaOrtu: s.namaOrtu || '', noTelepon: s.noTelepon || ''
                });
                setShowForm(true);
            };

            const handleDelete = (id) => {
                if (confirm('Yakin hapus siswa?')) {
                    DB.deleteSiswa(id);
                    updateKelasCount();
                    setSiswa(DB.getSiswa());
                    onRefresh();
                }
            };

            const handleExport = () => {
                const data = siswa.map(s => ({
                    NIS: s.nis,
                    Nama: s.nama,
                    Kelas: DB.getKelasById(s.kelasId)?.nama || '',
                    'Jenis Kelamin': s.jenisKelamin === 'L' ? 'Laki-laki' : 'Perempuan',
                    'Tempat Lahir': s.tempatLahir || '',
                    'Tanggal Lahir': s.tanggalLahir || '',
                    Alamat: s.alamat || '',
                    'Nama Ortu': s.namaOrtu || '',
                    'No Telepon': s.noTelepon || ''
                }));
                const csv = convertToCSV(data);
                downloadFile(csv, 'data-siswa.csv', 'text/csv');
            };

            const handleImport = () => {
                try {
                    const lines = importData.trim().split('\n');
                    const headers = lines[0].split(',').map(h => h.trim());
                    
                    for (let i = 1; i < lines.length; i++) {
                        const values = lines[i].split(',').map(v => v.trim());
                        const row = {};
                        headers.forEach((h, idx) => row[h] = values[idx]);
                        
                        const kelasId = kelas.find(k => k.nama === row['Kelas'])?.id || '';
                        
                        DB.saveSiswa({
                            id: 'siswa-' + Date.now() + '-' + i,
                            nis: row['NIS'] || row['nis'],
                            nama: row['Nama'] || row['nama'],
                            kelasId: kelasId,
                            jenisKelamin: row['Jenis Kelamin'] === 'Perempuan' ? 'P' : 'L',
                            tempatLahir: row['Tempat Lahir'] || '',
                            tanggalLahir: row['Tanggal Lahir'] || '',
                            alamat: row['Alamat'] || '',
                            namaOrtu: row['Nama Ortu'] || '',
                            noTelepon: row['No Telepon'] || '',
                            createdAt: new Date().toISOString()
                        });
                    }
                    updateKelasCount();
                    setSiswa(DB.getSiswa());
                    setShowImport(false);
                    setImportData('');
                    onRefresh();
                    alert('Import berhasil!');
                } catch (e) {
                    alert('Format CSV tidak valid');
                }
            };

            const convertToCSV = (data) => {
                if (data.length === 0) return '';
                const headers = Object.keys(data[0]);
                const rows = data.map(row => headers.map(h => '"' + (row[h] || '') + '"').join(','));
                return [headers.join(','), ...rows].join('\n');
            };

            const downloadFile = (content, filename, type) => {
                const blob = new Blob([content], { type });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
            };

            return (
                <div className="fade-in">

                            {kelas.map(k => <option key={k.id} value={k.id}>{k.nama}</option>)}
                        </select>
                    </div>

                    <div className="overflow-x-auto">
                        <table className="w-full">
                            <thead className="bg-gray-50">
                                <tr>
                                    <th className="px-4 py-3 text-left text-sm font-medium text-gray-700">NIS</th>
                                    <th className="px-4 py-3 text-left text-sm font-medium text-gray-700">Nama</th>
                                    <th className="px-4 py-3 text-left text-sm font-medium text-gray-700">Kelas</th>
                                    <th className="px-4 py-3 text-left text-sm font-medium text-gray-700">JK</th>
                                    <th className="px-4 py-3 text-left text-sm font-medium text-gray-700">Aksi</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y">
                                {filtered.map(s => (
                                    <tr key={s.id} className="hover:bg-gray-50">
                                        <td className="px-4 py-3">{s.nis}</td>
                                        <td className="px-4 py-3 font-medium">{s.nama}</td>
                                        <td className="px-4 py-3">{DB.getKelasById(s.kelasId)?.nama || '-'}</td>
                                        <td className="px-4 py-3">{s.jenisKelamin}</td>
                                        <td className="px-4 py-3">
                                            <div className="flex gap-2">
                                                <button onClick={() => handleEdit(s)} className="p-2 text-blue-600 hover:bg-blue-50 rounded"><Icons.Edit /></button>
                                                <button onClick={() => handleDelete(s.id)} className="p-2 text-red-600 hover:bg-red-50 rounded"><Icons.Trash /></button>

        // ==========================================
        // ABSENSI CONTENT (ADMIN REKAP)
        // ==========================================
        function AbsensiContent() {
            const [absensi, setAbsensi] = useState(DB.getAbsensi());
            const [guru] = useState(DB.getGuru());
            const [filterTanggal, setFilterTanggal] = useState(new Date().toISOString().split('T')[0]);
            const [filterGuru, setFilterGuru] = useState('');

            const filtered = absensi.filter(a => {
                const matchTanggal = filterTanggal ? a.tanggal === filterTanggal : true;
                const matchGuru = filterGuru ? a.guruId === filterGuru : true;
                return matchTanggal && matchGuru;
            }).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            const handleExport = () => {
                const data = filtered.map(a => ({
                    Tanggal: a.tanggal,
                    Guru: DB.getGuruById(a.guruId)?.nama,
                    Kelas: DB.getKelasById(a.kelasId)?.nama,
                    Mapel: DB.getMapelById(a.mapelId)?.nama,
                    'Jam Ke': a.jamKe,
                    'Materi': a.materi || '-',
                    'Jumlah Siswa': a.jumlahSiswa || 0,
                    'Siswa Hadir': a.siswaHadir || 0,
                    'Siswa Tidak Hadir': a.siswaTidakHadir?.length || a.siswaTidakHadir || 0,
                    'Keterangan': a.keterangan || '-'
                }));
                const csv = convertToCSV(data);
                downloadFile(csv, 'rekap-absensi-' + filterTanggal + '.csv', 'text/csv');
            };

            const convertToCSV = (data) => {
                if (data.length === 0) return '';
                const headers = Object.keys(data[0]);
                const rows = data.map(row => headers.map(h => '"' + (row[h] || '') + '"').join(','));
                return [headers.join(','), ...rows].join('\n');
            };

            const downloadFile = (content, filename, type) => {
                const blob = new Blob([content], { type });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
            };

            return (
                <div className="fade-in">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                        <h2 className="text-xl font-bold">Rekap Absensi KBM</h2>
                        <button onClick={handleExport} className="bg-emerald-600 text-white px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-emerald-700">
                            <Icons.Download /> Export CSV
                        </button>
                    </div>

                    <div className="flex gap-4 mb-4">
                        <div>
                            <label className="block text-sm font-medium mb-1">Tanggal</label>
                            <input 
                                type="date" 
                                value={filterTanggal}
                                onChange={e => setFilterTanggal(e.target.value)}
                                className="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                            />
                        </div>
                        <div>
                            <label className="block text-sm font-medium mb-1">Guru</label>
                            <select value={filterGuru} onChange={e => setFilterGuru(e.target.value)} className="px-4 py-2 border rounded-lg">
                                <option value="">Semua Guru</option>
                                {guru.map(g => <option key={g.id} value={g.id}>{g.nama}</option>)}
                            </select>
                        </div>
                    </div>

                    <div className="overflow-x-auto">
                        <table className="w-full">
                            <thead className="bg-gray-50">
                                <tr>
                                    <th className="px-4 py-3 text-left text-sm font-medium text-gray-700">Tanggal</th>
                                    <th className="px-4 py-3 text-left text-sm font-medium text-gray-700">Guru</th>
                                    <th className="px-4 py-3 text-left text-sm font-medium text-gray-700">Kelas</th>
                                    <th className="px-4 py-3 text-left text-sm font-medium text-gray-700">Mapel</th>
                                    <th className="px-4 py-3 text-left text-sm font-medium text-gray-700">Jam</th>
                                    <th className="px-4 py-3 text-left text-sm font-medium text-gray-700">Materi</th>
                                    <th className="px-4 py-3 text-left text-sm font-medium text-gray-700">Kehadiran</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y">
                                {filtered.map(a => (
                                    <tr key={a.id} className="hover:bg-gray-50">
                                        <td className="px-4 py-3">{a.tanggal}</td>
                                        <td className="px-4 py-3 font-medium">{DB.getGuruById(a.guruId)?.nama}</td>
                                        <td className="px-4 py-3">{DB.getKelasById(a.kelasId)?.nama}</td>
                                        <td className="px-4 py-3">{DB.getMapelById(a.mapelId)?.nama}</td>
                                        <td className="px-4 py-3">Jam {a.jamKe}</td>
                                        <td className="px-4 py-3 max-w-xs truncate">{a.materi || '-'}</td>
                                        <td className="px-4 py-3">
                                            <span className="text-green-600">{a.siswaHadir || 0} hadir</span>
                                            {(a.siswaTidakHadir?.length || a.siswaTidakHadir > 0) && <span className="text-red-600 ml-2">{(a.siswaTidakHadir?.length || a.siswaTidakHadir)} tidak hadir</span>}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {filtered.length === 0 && <p className="text-center py-8 text-gray-500">Tidak ada data absensi</p>}
                    </div>
                </div>
            );
        }

        // ==========================================
        // GURU ABSENSI (with Camera & Location)
        // ==========================================
        function GuruAbsensi({ guru, onRefresh }) {
            const [jadwal] = useState(DB.getJadwalByGuru(guru?.id || ''));
            const [showForm, setShowForm] = useState(false);
            const [capturedImage, setCapturedImage] = useState(null);
            const [location, setLocation] = useState(null);
            const [loadingLocation, setLoadingLocation] = useState(false);
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const [stream, setStream] = useState(null);

            const [formData, setFormData] = useState({
                jadwalId: '', kelasId: '', mapelId: '', jamKe: '',
                materi: '', deskripsi: '', keterangan: '',
                siswaTidakHadir: [], jumlahSiswa: 0, siswaHadir: 0
            });
            const [siswa, setSiswa] = useState([]);

            const hariIni = new Date().toLocaleDateString('id-ID', { weekday: 'long' });
            const jadwalHariIni = jadwal.filter(j => j.hari === hariIni);

            useEffect(() => {
                if (formData.kelasId) {
                    setSiswa(DB.getSiswaByKelas(formData.kelasId));
                }
            }, [formData.kelasId]);

            const startCamera = async () => {
                try {
                    const mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                    setStream(mediaStream);
                    if (videoRef.current) {
                        videoRef.current.srcObject = mediaStream;
                    }
                } catch (err) {
                    alert('Tidak dapat mengakses kamera: ' + err.message);
                }
            };

            const stopCamera = () => {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                    setStream(null);
                }
            };

            const capturePhoto = () => {
                if (videoRef.current && canvasRef.current) {
                    const canvas = canvasRef.current;
                    const video = videoRef.current;
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    setCapturedImage(canvas.toDataURL('image/jpeg'));
                    stopCamera();
                }
            };

            const getLocation = () => {
                setLoadingLocation(true);
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            setLocation({
                                lat: position.coords.latitude,
                                lng: position.coords.longitude,
                                accuracy: position.coords.accuracy
                            });
                            setLoadingLocation(false);
                        },
                        (error) => {
                            alert('Gagal mendapatkan lokasi: ' + error.message);
                            setLoadingLocation(false);
                        }
                    );
                } else {
                    alert('Browser tidak mendukung geolocation');
                    setLoadingLocation(false);
                }
            };

            const handleJadwalChange = (jadwalId) => {
                const selected = jadwal.find(j => j.id === jadwalId);
                if (selected) {
                    setFormData({
                        ...formData, jadwalId, kelasId: selected.kelasId,
                        mapelId: selected.mapelId, jamKe: selected.jamKe
                    });
                }
            };

            const toggleSiswaTidakHadir = (siswaId) => {
                const current = formData.siswaTidakHadir;
                if (current.includes(siswaId)) {
                    setFormData({ ...formData, siswaTidakHadir: current.filter(id => id !== siswaId) });
                } else {
                    setFormData({ ...formData, siswaTidakHadir: [...current, siswaId] });
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!capturedImage) {
                    alert('Silakan ambil foto selfie terlebih dahulu');
                    return;
                }
                if (!location) {
                    alert('Silakan ambil lokasi terlebih dahulu');
                    return;
                }

                const jumlahSiswa = siswa.length;
                const siswaTidakHadirList = formData.siswaTidakHadir;
                const siswaHadir = jumlahSiswa - siswaTidakHadirList.length;

                DB.saveAbsensi({
                    id: 'absensi-' + Date.now(),
                    guruId: guru.id,
                    ...formData,
                    jumlahSiswa,
                    siswaHadir,
                    siswaTidakHadir: siswaTidakHadirList.length,
                    fotoSelfie: capturedImage,
                    lokasi: location,
                    tanggal: new Date().toISOString().split('T')[0],
                    createdAt: new Date().toISOString()
                });

                alert('Absensi berhasil disimpan!');
                setShowForm(false);
                setCapturedImage(null);
                setLocation(null);
                setFormData({
                    jadwalId: '', kelasId: '', mapelId: '', jamKe: '',
                    materi: '', deskripsi: '', keterangan: '',
                    siswaTidakHadir: [], jumlahSiswa: 0, siswaHadir: 0
                });
                onRefresh();
            };

            return (
                <div className="fade-in">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                        <h2 className="text-xl font-bold">Absensi KBM</h2>
                        <button onClick={() => { setShowForm(true); startCamera(); }} className="bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-blue-700">
                            <Icons.Plus /> Input Absensi
                        </button>
                    </div>

                    <div className="border rounded-xl p-4 mb-6">
                        <h3 className="font-semibold mb-4">Jadwal Hari Ini ({hariIni})</h3>
                        <div className="space-y-3">
                            {jadwalHariIni.length > 0 ? jadwalHariIni.sort((a, b) => parseInt(a.jamKe) - parseInt(b.jamKe)).map(j => (
                                <div key={j.id} className="flex items-center gap-4 p-3 bg-gray-50 rounded-lg">
                                    <div className="w-12 h-12 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center font-bold">
                                        {j.jamKe}
                                    </div>
                                    <div className="flex-1">
                                        <p className="font-medium">{DB.getMapelById(j.mapelId)?.nama}</p>
                                        <p className="text-sm text-gray-600">{DB.getKelasById(j.kelasId)?.nama}</p>
                                    </div>
                                </div>
                            )) : <p className="text-gray-500 text-center py-4">Tidak ada jadwal hari ini</p>}
                        </div>
                    </div>

                    <Modal isOpen={showForm} onClose={() => { setShowForm(false); stopCamera(); }} title="Input Absensi KBM" maxWidth="max-w-4xl">
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium mb-1">Pilih Jadwal *</label>
                                    <select required value={formData.jadwalId} onChange={e => handleJadwalChange(e.target.value)} className="w-full px-3 py-2 border rounded-lg">
                                        <option value="">-- Pilih Jadwal --</option>
                                        {jadwalHariIni.map(j => (
                                            <option key={j.id} value={j.id}>
                                                Jam {j.jamKe} - {DB.getMapelById(j.mapelId)?.nama} ({DB.getKelasById(j.kelasId)?.nama})
                                            </option>
                                        ))}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Jam Pelajaran</label>
                                    <input type="text" disabled value={formData.jamKe ? 'Jam ' + formData.jamKe : ''} className="w-full px-3 py-2 border rounded-lg bg-gray-100" />
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-medium mb-1">Materi Pembelajaran *</label>
                                <input type="text" required value={formData.materi} onChange={e => setFormData({...formData, materi: e.target.value})} className="w-full px-3 py-2 border rounded-lg" placeholder="Judul materi yang diajarkan" />
                            </div>

                            <div>
                                <label className="block text-sm font-medium mb-1">Deskripsi Kegiatan</label>
                                <textarea value={formData.deskripsi} onChange={e => setFormData({...formData, deskripsi: e.target.value})} className="w-full px-3 py-2 border rounded-lg" rows="2" placeholder="Uraian singkat kegiatan pembelajaran"></textarea>
                            </div>

                            {siswa.length > 0 && (
                                <div>
                                    <label className="block text-sm font-medium mb-2">Siswa Tidak Hadir ({formData.siswaTidakHadir.length}/{siswa.length})</label>
                                    <div className="max-h-40 overflow-y-auto border rounded-lg p-2 space-y-1">
                                        {siswa.map(s => (
                                            <label key={s.id} className="flex items-center gap-2 p-2 hover:bg-gray-50 rounded cursor-pointer">
                                                <input 
                                                    type="checkbox" 
                                                    checked={formData.siswaTidakHadir.includes(s.id)}
                                                    onChange={() => toggleSiswaTidakHadir(s.id)}
                                                    className="w-4 h-4"
                                                />
                                                <span>{s.nis} - {s.nama}</span>
                                            </label>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium mb-1">Foto Selfie *</label>
                                    <div className="border rounded-lg p-2">
                                        {!capturedImage ? (
                                            <div className="space-y-2">
                                                <video ref={videoRef} autoPlay playsInline className="w-full h-40 bg-gray-900 rounded" />
                                                <button type="button" onClick={capturePhoto} className="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
                                                    Ambil Foto
                                                </button>
                                            </div>
                                        ) : (
                                            <div className="space-y-2">
                                                <img src={capturedImage} alt="Captured" className="w-full h-40 object-cover rounded" />
                                                <button type="button" onClick={() => { setCapturedImage(null); startCamera(); }} className="w-full bg-gray-600 text-white py-2 rounded hover:bg-gray-700">
                                                    Ulangi Foto
                                                </button>
                                            </div>
                                        )}
                                        <canvas ref={canvasRef} className="hidden" />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">Lokasi *</label>
                                    <div className="border rounded-lg p-2">
                                        {!location ? (
                                            <button 
                                                type="button" 
                                                onClick={getLocation} 
                                                disabled={loadingLocation}
                                                className="w-full bg-emerald-600 text-white py-8 rounded hover:bg-emerald-700 disabled:opacity-50"
                                            >
                                                {loadingLocation ? 'Mendeteksi...' : 'Ambil Lokasi'}
                                            </button>
                                        ) : (
                                            <div className="text-sm py-6">
                                                <p className="text-green-600 font-medium">Lokasi terekam</p>
                                                <p className="text-gray-600">Lat: {location.lat.toFixed(6)}</p>
                                                <p className="text-gray-600">Lng: {location.lng.toFixed(6)}</p>
                                                <button type="button" onClick={getLocation} className="text-blue-600 text-xs mt-2">Ulangi</button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-medium mb-1">Keterangan Tambahan</label>
                                <textarea value={formData.keterangan} onChange={e => setFormData({...formData, keterangan: e.target.value})} className="w-full px-3 py-2 border rounded-lg" rows="2" placeholder="Keterangan tambahan (opsional)"></textarea>
                            </div>

                            <div className="flex justify-end gap-2 pt-4">
                                <button type="button" onClick={() => { setShowForm(false); stopCamera(); }} className="px-4 py-2 border rounded-lg hover:bg-gray-50">Batal</button>
                                <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Simpan Absensi</button>
                            </div>
                        </form>
                    </Modal>
                </div>
            );
        }

        // ==========================================
        // GURU RIWAYAT
        // ==========================================
        function GuruRiwayat({ guru }) {
            const [absensi, setAbsensi] = useState(DB.getAbsensiByGuru(guru?.id || ''));
            const [filterBulan, setFilterBulan] = useState('');
            const [filterTahun, setFilterTahun] = useState(new Date().getFullYear().toString());

            const bulanList = [
                { value: '01', label: 'Januari' },
                { value: '02', label: 'Februari' },
                { value: '03', label: 'Maret' },
                { value: '04', label: 'April' },
                { value: '05', label: 'Mei' },
                { value: '06', label: 'Juni' },
                { value: '07', label: 'Juli' },
                { value: '08', label: 'Agustus' },
                { value: '09', label: 'September' },
                { value: '10', label: 'Oktober' },
                { value: '11', label: 'November' },
                { value: '12', label: 'Desember' },
            ];

            const filtered = absensi.filter(a => {
                const date = new Date(a.tanggal);
                const matchBulan = filterBulan ? (date.getMonth() + 1).toString().padStart(2, '0') === filterBulan : true;
                const matchTahun = filterTahun ? date.getFullYear().toString() === filterTahun : true;
                return matchBulan && matchTahun;
            }).sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));

            const stats = {
                total: filtered.length,
                hadir: filtered.reduce((acc, a) => acc + (a.siswaHadir || 0), 0),
                tidakHadir: filtered.reduce((acc, a) => acc + (a.siswaTidakHadir || 0), 0),
            };

            const handleExport = () => {
                const data = filtered.map(a => ({
                    Tanggal: a.tanggal,
                    Kelas: DB.getKelasById(a.kelasId)?.nama,
                    Mapel: DB.getMapelById(a.mapelId)?.nama,
                    'Jam Ke': a.jamKe,
                    Materi: a.materi || '-',
                    'Jumlah Siswa': a.jumlahSiswa || 0,
                    'Siswa Hadir': a.siswaHadir || 0,
                    'Siswa Tidak Hadir': a.siswaTidakHadir || 0,
                    Keterangan: a.keterangan || '-'
                }));
                const csv = convertToCSV(data);
                downloadFile(csv, 'riwayat-absensi-' + (guru?.nama || '') + '-' + filterBulan + '-' + filterTahun + '.csv', 'text/csv');
            };

            const convertToCSV = (data) => {
                if (data.length === 0) return '';
                const headers = Object.keys(data[0]);
                const rows = data.map(row => headers.map(h => '"' + (row[h] || '') + '"').join(','));
                return [headers.join(','), ...rows].join('\n');
            };

            const downloadFile = (content, filename, type) => {
                const blob = new Blob([content], { type });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
            };

            return (
                <div className="fade-in">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                        <h2 className="text-xl font-bold">Riwayat Absensi</h2>
                        <button onClick={handleExport} className="bg-emerald-600 text-white px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-emerald-700">
                            <Icons.Download /> Export
                        </button>
                    </div>

                    <div className="grid grid-cols-3 gap-4 mb-6">
                        <div className="bg-blue-50 rounded-xl p-4">
                            <p className="text-sm text-blue-600">Total Absensi</p>
                            <p className="text-2xl font-bold text-blue-800">{stats.total}</p>
                        </div>
                        <div className="bg-green-50 rounded-xl p-4">
                            <p className="text-sm text-green-600">Total Siswa Hadir</p>
                            <p className="text-2xl font-bold text-green-800">{stats.hadir}</p>
                        </div>
                        <div className="bg-red-50 rounded-xl p-4">
                            <p className="text-sm text-red-600">Total Siswa Tidak Hadir</p>
                            <p className="text-2xl font-bold text-red-800">{stats.tidakHadir}</p>
                        </div>
                    </div>

                    <div className="flex gap-4 mb-4">
                        <select value={filterBulan} onChange={e => setFilterBulan(e.target.value)} className="px-4 py-2 border rounded-lg">
                            <option value="">Semua Bulan</option>
                            {bulanList.map(b => <option key={b.value} value={b.value}>{b.label}</option>)}
                        </select>
                        <input 
                            type="number" 
                            value={filterTahun}
                            onChange={e => setFilterTahun(e.target.value)}
                            className="px-4 py-2 border rounded-lg w-32"
                            placeholder="Tahun"
                        />
                    </div>

                    <div className="overflow-x-auto">
                        <table className="w-full">
                            <thead className="bg-gray-50">
                                <tr>
                                    <th className="px-4 py-3 text-left text-sm font-medium text-gray-700">Tanggal</th>
                                    <th className="px-4 py-3 text-left text-sm font-medium text-gray-700">Kelas</th>
                                    <th className="px-4 py-3 text-left text-sm font-medium text-gray-700">Mapel</th>
                                    <th className="px-4 py-3 text-left text-sm font-medium text-gray-700">Jam</th>
                                    <th className="px-4 py-3 text-left text-sm font-medium text-gray-700">Materi</th>
                                    <th className="px-4 py-3 text-left text-sm font-medium text-gray-700">Kehadiran</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y">
                                {filtered.map(a => (
                                    <tr key={a.id} className="hover:bg-gray-50">
                                        <td className="px-4 py-3">{a.tanggal}</td>
                                        <td className="px-4 py-3">{DB.getKelasById(a.kelasId)?.nama}</td>
                                        <td className="px-4 py-3">{DB.getMapelById(a.mapelId)?.nama}</td>
                                        <td className="px-4 py-3">Jam {a.jamKe}</td>
                                        <td className="px-4 py-3 max-w-xs truncate">{a.materi || '-'}</td>
                                        <td className="px-4 py-3">
                                            <span className="text-green-600">{a.siswaHadir || 0} hadir</span>
                                            {(a.siswaTidakHadir > 0) && (
                                                <span className="text-red-600 ml-2">{a.siswaTidakHadir} tidak hadir</span>
                                            )}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {filtered.length === 0 && <p className="text-center py-8 text-gray-500">Tidak ada data riwayat absensi</p>}
                    </div>
                </div>
            );
        }

                                            {m.nama}
                                        </span>
                                    ))}
                                    {mapelList.length === 0 && <p className="text-gray-500">Belum ada jadwal mengajar</p>}
                                </div>
                            </div>

                            <div className="border rounded-xl p-6">
                                <h3 className="font-semibold mb-4">Keamanan</h3>
                                {!showPasswordForm ? (
                                    <button onClick={() => setShowPasswordForm(true)} className="w-full bg-slate-700 text-white py-2 rounded-lg hover:bg-slate-800">
                                        Ubah Password
                                    </button>
                                ) : (
                                    <form onSubmit={handlePasswordChange} className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium mb-1">Password Saat Ini</label>
                                            <input type="password" required value={passwordData.current} onChange={e => setPasswordData({...passwordData, current: e.target.value})} className="w-full px-3 py-2 border rounded-lg" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1">Password Baru</label>
                                            <input type="password" required value={passwordData.new} onChange={e => setPasswordData({...passwordData, new: e.target.value})} className="w-full px-3 py-2 border rounded-lg" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1">Konfirmasi Password Baru</label>
                                            <input type="password" required value={passwordData.confirm} onChange={e => setPasswordData({...passwordData, confirm: e.target.value})} className="w-full px-3 py-2 border rounded-lg" />
                                        </div>
                                        <div className="flex gap-2">
                                            <button type="button" onClick={() => setShowPasswordForm(false)} className="flex-1 px-4 py-2 border rounded-lg hover:bg-gray-50">Batal</button>
                                            <button type="submit" className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Ubah Password</button>
                                        </div>
                                    </form>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // MAIN APP
        // ==========================================
        function App() {
            const [user, setUser] = useState(DB.getCurrentUser());

            const handleLogin = (loggedInUser) => {
                setUser(loggedInUser);
            };

            const handleLogout = () => {
                DB.setCurrentUser(null);
                setUser(null);
            };

            if (!user) {
                return <Login onLogin={handleLogin} />;
            }

            if (user.role === 'admin') {
                return <AdminDashboard onLogout={handleLogout} />;
            }

            return <GuruDashboard user={user} onLogout={handleLogout} />;
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
